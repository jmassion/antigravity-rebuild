<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtuos Studios — Living Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ═══════════════════════════════════════════════════════════
   📌 SEC 2: CSS — ATMOSPHERE & GRAIN 🎬
   ═══════════════════════════════════════════════════════════ */

:root {
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.12);
    --void: #010104;
    --fd: 'Cormorant Garamond', serif;
    --fm: 'Space Mono', monospace;
    --fu: 'Syne', sans-serif;
    --accent-r: 201; --accent-g: 168; --accent-b: 76;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--void); color:#fff; font-family:var(--fu); }

/* 🎬 Film grain — subtle analog texture */
#grain {
    position:fixed; inset:0; z-index:9000; pointer-events:none;
    opacity:0.03; mix-blend-mode:overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px;
    animation: grn 0.4s steps(3) infinite;
}
@keyframes grn {
    0%{transform:translate(0,0)} 33%{transform:translate(-2px,1px)}
    66%{transform:translate(1px,-2px)} 100%{transform:translate(2px,1px)}
}

/* 🖱️ Cursor glow — follows mouse */
#cglow {
    position:fixed; width:300px; height:300px; border-radius:50%;
    pointer-events:none; z-index:8999;
    background: radial-gradient(circle, rgba(201,168,76,0.03) 0%, transparent 65%);
    transform:translate(-50%,-50%);
    transition: left 0.08s, top 0.08s;
}

/* 🌈 Section color wash — shifts as you walk */
#color-wash {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    opacity:0; transition: opacity 1s, background 1.5s;
    mix-blend-mode: screen;
}

/* ═══════════════════════════════════════════════════════════
   📌 SEC 3: CSS — LOADING 🔄
   ═══════════════════════════════════════════════════════════ */

#loading {
    position:fixed; inset:0; background:var(--void);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:10000; transition: opacity 1.5s cubic-bezier(0.16,1,0.3,1);
}
#loading.done { opacity:0; pointer-events:none; }

.ld-line {
    width:80px; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: ldp 2s ease infinite;
}
@keyframes ldp { 0%,100%{opacity:0.2;transform:scaleX(0.5)} 50%{opacity:1;transform:scaleX(1)} }
.ld-txt {
    margin-top:1.2rem; font-family:var(--fm); font-size:0.5rem;
    letter-spacing:0.4em; color:rgba(255,255,255,0.15); text-transform:uppercase;
}

/* ═══════════════════════════════════════════════════════════
   📌 SEC 4: CSS — HUD SYSTEM 🧭
   ═══════════════════════════════════════════════════════════ */

#hud { position:fixed; inset:0; pointer-events:none; z-index:100; }

#hud-title {
    position:absolute; bottom:4rem; left:50%; transform:translateX(-50%);
    font-family:var(--fd); font-size:2rem; font-weight:300; letter-spacing:0.15em;
    color:rgba(255,255,255,0.45);
    text-shadow: 0 0 40px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.2);
    transition: all 0.7s cubic-bezier(0.16,1,0.3,1);
    white-space:nowrap;
}
#hud-sub {
    position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
    font-family:var(--fm); font-size:0.42rem; letter-spacing:0.3em;
    color:rgba(255,255,255,0.1); text-transform:uppercase;
    transition: all 0.7s; white-space:nowrap;
}

/* 📊 Progress — gold glow line at bottom */
#prog {
    position:absolute; bottom:0; left:0; height:1px;
    background: linear-gradient(90deg, var(--gold), rgba(201,168,76,0.2));
    box-shadow: 0 0 12px rgba(201,168,76,0.25), 0 -2px 8px rgba(201,168,76,0.1);
    transition: width 0.3s;
}

#scroll-hint {
    position:absolute; bottom:7rem; left:50%; transform:translateX(-50%);
    font-family:var(--fm); font-size:0.4rem; letter-spacing:0.3em;
    color:rgba(255,255,255,0.06); animation: br 4s ease infinite;
}
@keyframes br { 0%,100%{opacity:0.06} 50%{opacity:0.2} }

#click-hint {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:var(--fm); font-size:0.48rem; letter-spacing:0.18em;
    color:var(--gold); opacity:0; transition:opacity 0.3s;
    pointer-events:none; z-index:90;
    background:rgba(1,1,4,0.75); backdrop-filter:blur(12px);
    padding:0.55rem 1.4rem; border-radius:100px;
    border:1px solid rgba(201,168,76,0.12);
}

#sec-num {
    position:fixed; top:1.3rem; left:1.5rem;
    font-family:var(--fm); font-size:0.48rem; letter-spacing:0.2em;
    color:rgba(255,255,255,0.08); z-index:200; pointer-events:none;
    transition: all 0.5s;
}

#sitemap-btn {
    position:fixed; top:1.1rem; right:1.2rem; z-index:200; pointer-events:all;
    background:rgba(255,255,255,0.015); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.05); color:rgba(255,255,255,0.25);
    font-family:var(--fm); font-size:0.45rem; letter-spacing:0.18em;
    padding:0.55rem 1.2rem; border-radius:100px;
    cursor:pointer; transition:all 0.4s; text-transform:uppercase;
}
#sitemap-btn:hover {
    border-color:rgba(201,168,76,0.35); color:var(--gold);
    box-shadow:0 0 25px rgba(201,168,76,0.06);
}

/* ═══════════════════════════════════════════════════════════
   📌 SEC 5: CSS — CAROUSEL 🎠
   ═══════════════════════════════════════════════════════════ */

#carousel {
    position:fixed; inset:0; background:rgba(1,1,4,0.97);
    z-index:5000; display:none; flex-direction:column;
    align-items:center; justify-content:center; backdrop-filter:blur(25px);
}
#carousel.open { display:flex; }

.c-close {
    position:absolute; top:1.5rem; right:1.5rem;
    width:44px; height:44px; background:none;
    border:1px solid rgba(255,255,255,0.08); border-radius:50%;
    color:rgba(255,255,255,0.35); font-size:1rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.4s; z-index:10;
}
.c-close:hover { border-color:var(--gold); color:var(--gold); transform:rotate(90deg); }

.c-title {
    position:absolute; top:2.5rem; left:2.5rem;
    font-family:var(--fd); font-size:2.4rem; font-weight:300;
    color:var(--gold); z-index:10; letter-spacing:0.06em;
}
.c-sub {
    position:absolute; top:6rem; left:2.5rem;
    font-family:var(--fm); font-size:0.5rem;
    color:rgba(255,255,255,0.2); letter-spacing:0.2em; z-index:10;
}

.c-track {
    width:100%; overflow-x:auto; overflow-y:hidden;
    scroll-snap-type:x mandatory; display:flex; gap:2rem;
    padding:8rem 2.5rem 3rem; scrollbar-width:none;
}
.c-track::-webkit-scrollbar { display:none; }

.c-card {
    flex:0 0 auto; width:min(80vw,720px); height:min(60vh,500px);
    border-radius:10px; overflow:hidden; scroll-snap-align:center;
    position:relative; background:#080810;
    border:1px solid rgba(255,255,255,0.03);
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), box-shadow 0.5s;
}
.c-card:hover {
    transform:scale(1.015);
    box-shadow:0 30px 80px rgba(0,0,0,0.5), 0 0 40px rgba(201,168,76,0.04);
}
.c-card img { width:100%; height:100%; object-fit:cover; }
.c-card-n {
    position:absolute; bottom:0.8rem; right:1rem;
    font-family:var(--fm); font-size:0.45rem; color:rgba(255,255,255,0.12);
}

.c-arr {
    position:absolute; top:50%; transform:translateY(-50%);
    width:48px; height:48px; background:rgba(1,1,4,0.7); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.06); border-radius:50%;
    color:rgba(255,255,255,0.3); font-size:1.3rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    z-index:10; transition:all 0.4s;
}
.c-arr:hover { border-color:var(--gold); color:var(--gold); }
.c-arr.l { left:1rem; }
.c-arr.r { right:1rem; }

/* ═══════════════════════════════════════════════════════════
   📌 SEC 6: CSS — SITEMAP 🗺️
   ═══════════════════════════════════════════════════════════ */

#sitemap {
    position:fixed; inset:0; background:rgba(1,1,4,0.98);
    z-index:6000; display:none; flex-direction:column;
    backdrop-filter:blur(30px);
}
#sitemap.open { display:flex; }

.sm-head {
    height:56px; padding:0 2rem; display:flex;
    align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,0.03); flex-shrink:0;
}
.sm-head-t { font-family:var(--fd); font-size:1.15rem; font-weight:300; color:var(--gold); letter-spacing:0.08em; }
.sm-x {
    width:34px; height:34px; background:none;
    border:1px solid rgba(255,255,255,0.08); border-radius:50%;
    color:rgba(255,255,255,0.3); font-size:0.85rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.4s;
}
.sm-x:hover { border-color:var(--gold); color:var(--gold); transform:rotate(90deg); }

.sm-body {
    flex:1; overflow:auto; padding:2.5rem;
    background:radial-gradient(ellipse at 25% 15%, rgba(201,168,76,0.012), transparent 55%),
               radial-gradient(ellipse at 75% 85%, rgba(80,100,220,0.008), transparent 50%),
               var(--void);
}
.sm-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:1.6rem; max-width:1500px; margin:0 auto;
}

.sm-card {
    background:rgba(255,255,255,0.012); border:1px solid rgba(255,255,255,0.035);
    border-radius:12px; overflow:hidden; cursor:pointer;
    transition:all 0.5s cubic-bezier(0.16,1,0.3,1); position:relative;
}
.sm-card:hover {
    border-color:rgba(201,168,76,0.25); transform:translateY(-5px) scale(1.008);
    box-shadow:0 20px 50px rgba(0,0,0,0.35), 0 0 35px rgba(201,168,76,0.03);
}
.sm-cover { width:100%; aspect-ratio:16/10; object-fit:cover; display:block; }
.sm-ph {
    width:100%; aspect-ratio:16/10; display:flex;
    align-items:center; justify-content:center;
    font-size:3.5rem; font-family:var(--fd); font-weight:300;
    color:rgba(255,255,255,0.05); font-style:italic;
}
.sm-info { padding:1rem 1.3rem; }
.sm-num { font-family:var(--fm); font-size:0.42rem; color:rgba(255,255,255,0.12); letter-spacing:0.2em; margin-bottom:0.25rem; }
.sm-t { font-family:var(--fd); font-size:1.15rem; font-weight:300; color:rgba(255,255,255,0.75); letter-spacing:0.04em; margin-bottom:0.12rem; }
.sm-s { font-family:var(--fm); font-size:0.42rem; color:rgba(255,255,255,0.15); letter-spacing:0.08em; }
.sm-badge {
    position:absolute; top:0.7rem; right:0.7rem;
    background:rgba(1,1,4,0.75); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.05); border-radius:100px;
    padding:0.15rem 0.6rem; font-family:var(--fm); font-size:0.38rem;
    color:rgba(255,255,255,0.25); letter-spacing:0.08em;
}
.sm-dots { display:flex; gap:2px; padding:0 1.3rem 0.8rem; }
.sm-dot { flex:1; height:2px; background:rgba(255,255,255,0.03); border-radius:1px; }

.sm-card.logo-c { grid-column:1/-1; max-width:400px; margin:0 auto 0.8rem; }
.sm-card.logo-c .sm-cover { aspect-ratio:3/1; background:#000; padding:1.5rem; object-fit:contain; }

</style>
</head>

// ═══════════════════════════════════════════════════════════
// 📌 SEC 9: THREE.JS CORE 🌍
// ═══════════════════════════════════════════════════════════

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010104);
scene.fog = new THREE.Fog(0x010104, 5, 65);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 2.4, 3);

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.body.appendChild(renderer.domElement);

const TL = new THREE.TextureLoader();

// 🏛️ Gallery dimensions
const GW=11, WH=6, SP=14, SZ=10;
const GL = SZ + D.length*SP + 15;
const paintings = [];


// ═══════════════════════════════════════════════════════════
// 📌 SEC 10: CATHEDRAL ARCHITECTURE 🏛️
//
// Not just a box anymore! We build:
//  - Floor with subtle reflective quality
//  - Walls with recessed alcove geometry per painting
//  - Arched ceiling ribs (curved geometry!)
//  - Decorative pilasters between alcoves
//  - Neon accent lines
// ═══════════════════════════════════════════════════════════

function buildCathedral() {

    // ─────────────────────────────
    // 🟫 Floor — dark mirror
    // ─────────────────────────────
    const flMat = new THREE.MeshStandardMaterial({
        color:0x030308, roughness:0.08, metalness:0.7
    });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(GW, GL), flMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(0, 0, -GL/2+SZ);
    scene.add(floor);

    // ─────────────────────────────
    // 🧱 Main walls (left + right)
    // ─────────────────────────────
    const wMat = new THREE.MeshStandardMaterial({ color:0x06060c, roughness:0.85, metalness:0.1 });

    [-1,1].forEach(side => {
        const w = new THREE.Mesh(new THREE.PlaneGeometry(GL, WH), wMat);
        w.position.set(side*GW/2, WH/2, -GL/2+SZ);
        w.rotation.y = side===-1 ? Math.PI/2 : -Math.PI/2;
        scene.add(w);
    });

    // Ceiling
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(GW,GL),
        new THREE.MeshBasicMaterial({color:0x020208}));
    ceil.rotation.x = Math.PI/2;
    ceil.position.set(0, WH, -GL/2+SZ);
    scene.add(ceil);

    // Back wall
    const bw = new THREE.Mesh(new THREE.PlaneGeometry(GW,WH), wMat);
    bw.position.set(0, WH/2, -GL+SZ);
    scene.add(bw);


    // ─────────────────────────────
    // 🏛️ ARCHED CEILING RIBS
    //
    // Curved tubes that arch across the ceiling
    // like a gothic cathedral! Every 7 units.
    // ─────────────────────────────
    const ribMat = new THREE.MeshBasicMaterial({ color:0x0c0c18 });

    for (let z = 0; z > -GL; z -= 7) {
        // 🌀 Create an arch curve
        const archPts = [];
        for (let a = 0; a <= Math.PI; a += Math.PI/12) {
            archPts.push(new THREE.Vector3(
                Math.cos(a) * GW/2,           // 👈 X: side to side
                WH - 0.3 + Math.sin(a) * 0.8, // 👈 Y: arch shape
                z + SZ                          // 👈 Z: position along corridor
            ));
        }
        const archCurve = new THREE.CatmullRomCurve3(archPts);
        const ribGeo = new THREE.TubeGeometry(archCurve, 16, 0.06, 6, false);
        scene.add(new THREE.Mesh(ribGeo, ribMat));
    }


    // ─────────────────────────────
    // 🏛️ PILASTERS (decorative columns between paintings)
    //
    // Thin rectangular columns on each wall,
    // placed between where paintings go.
    // Makes the space feel architectural! 🏛️
    // ─────────────────────────────
    const pilMat = new THREE.MeshBasicMaterial({ color:0x0a0a14 });

    D.forEach((_, i) => {
        const z = -(SZ + i*SP) + SP/2; // 📍 Between paintings
        if (i >= D.length - 1) return;

        [-1,1].forEach(side => {
            // Pilaster body
            const pil = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, WH-0.5, 0.5),
                pilMat
            );
            pil.position.set(side*(GW/2-0.08), WH/2-0.25, z);
            scene.add(pil);

            // Cap (small wider piece on top)
            const cap = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.15, 0.7),
                pilMat
            );
            cap.position.set(side*(GW/2-0.08), WH-0.6, z);
            scene.add(cap);
        });
    });


    // ─────────────────────────────
    // 💎 NEON ACCENT LINES
    //
    // Gold strips along floor edges +
    // subtle lines at wall-ceiling junction
    // ─────────────────────────────
    const nGeo = new THREE.PlaneGeometry(0.025, GL);
    const nMat = new THREE.MeshBasicMaterial({color:0xc9a84c, transparent:true, opacity:0.2});

    [-1,1].forEach(side => {
        // Floor edge
        const fe = new THREE.Mesh(nGeo, nMat);
        fe.rotation.x=-Math.PI/2;
        fe.position.set(side*(GW/2-0.03), 0.003, -GL/2+SZ);
        scene.add(fe);

        // Ceiling edge (dimmer)
        const ce = new THREE.Mesh(nGeo,
            new THREE.MeshBasicMaterial({color:0xc9a84c, transparent:true, opacity:0.06}));
        ce.rotation.x=-Math.PI/2;
        ce.position.set(side*(GW/2-0.03), WH-0.003, -GL/2+SZ);
        scene.add(ce);
    });

    // Center floor line
    const cl = new THREE.Mesh(new THREE.PlaneGeometry(0.01, GL),
        new THREE.MeshBasicMaterial({color:0xc9a84c, transparent:true, opacity:0.04}));
    cl.rotation.x=-Math.PI/2;
    cl.position.set(0, 0.002, -GL/2+SZ);
    scene.add(cl);
}


// ═══════════════════════════════════════════════════════════
// 📌 SEC 11: PAINTING ALCOVES & GLOW 🖼️💫
//
// Each painting is displayed in a RECESSED ALCOVE
// (a little cave in the wall) with:
//  - The painting floating slightly off the back wall
//  - A GLOW AURA behind the painting (additive plane)
//  - A GLOW POOL on the floor beneath
//  - An ornate double frame
//  - A volumetric light beam from above
//  - Proximity reactions (scale + glow up)
// ═══════════════════════════════════════════════════════════

function buildPaintings() {
    const pW=5.5, pH=3.4;

    D.forEach((sec, i) => {
        const z = -(SZ + i*SP);
        const side = i%2===0 ? -1 : 1;
        const wallX = side * GW/2;

        const r=(sec.c>>16)&255, g=(sec.c>>8)&255, b=sec.c&255;
        const col = new THREE.Color(sec.c);

        // ═════════════════════════════════
        // 🕳️ ALCOVE (recessed niche in the wall)
        //
        // A darker box carved into the wall
        // that the painting sits inside of
        // ═════════════════════════════════
        const alcW=pW+1.2, alcH=pH+1.4, alcD=0.7;
        const alcMat = new THREE.MeshBasicMaterial({color:0x030308});

        // Back of alcove
        const alcBack = new THREE.Mesh(new THREE.PlaneGeometry(alcW, alcH), alcMat);
        alcBack.position.set(wallX - side*alcD, 2.3, z);
        alcBack.rotation.y = side===-1 ? Math.PI/2 : -Math.PI/2;
        scene.add(alcBack);

        // Top/bottom/sides of alcove
        const alcTop = new THREE.Mesh(new THREE.PlaneGeometry(alcW, alcD), alcMat);
        alcTop.rotation.x = Math.PI/2;
        alcTop.position.set(wallX-side*alcD/2, 2.3+alcH/2, z);
        alcTop.rotation.y = side===-1 ? Math.PI/2 : -Math.PI/2;
        scene.add(alcTop);

        const alcBot = new THREE.Mesh(new THREE.PlaneGeometry(alcW, alcD), alcMat);
        alcBot.rotation.x = -Math.PI/2;
        alcBot.position.set(wallX-side*alcD/2, 2.3-alcH/2, z);
        alcBot.rotation.y = side===-1 ? Math.PI/2 : -Math.PI/2;
        scene.add(alcBot);


        // ═════════════════════════════════
        // 💫 GLOW AURA behind painting
        //
        // A translucent colored plane BEHIND the painting
        // with additive blending — creates a halo glow!
        // ═════════════════════════════════
        const auraMat = new THREE.MeshBasicMaterial({
            color: sec.c, transparent:true, opacity:0.08,
            blending: THREE.AdditiveBlending, depthWrite:false
        });
        const aura = new THREE.Mesh(new THREE.PlaneGeometry(pW+1.5, pH+1.2), auraMat);
        aura.position.set(wallX-side*0.45, 2.3, z);
        aura.rotation.y = side===-1 ? Math.PI/2 : -Math.PI/2;
        scene.add(aura);


        // ═════════════════════════════════
        // 🎨 Painting canvas (rich placeholder)
        // ═════════════════════════════════
        const cv = document.createElement('canvas'); cv.width=1024; cv.height=640;
        const cx = cv.getContext('2d');

        // Multi-stop gradient
        const gr = cx.createRadialGradient(512,320,50,512,320,600);
        gr.addColorStop(0, `rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`);
        gr.addColorStop(0.5, `rgb(${r},${g},${b})`);
        gr.addColorStop(1, `rgb(${r>>2},${g>>2},${b>>2})`);
        cx.fillStyle=gr; cx.fillRect(0,0,1024,640);

        // Noise texture
        for(let p=0;p<5000;p++){
            cx.fillStyle=`rgba(${Math.random()>0.5?255:0},${Math.random()>0.5?255:0},${Math.random()>0.5?255:0},${Math.random()*0.02})`;
            cx.fillRect(Math.random()*1024,Math.random()*640,Math.random()*3+1,Math.random()*3+1);
        }

        // Section number watermark
        cx.fillStyle='rgba(255,255,255,0.04)';
        cx.font='bold 320px serif'; cx.textAlign='center';
        cx.fillText(`0${i+1}`,512,450);

        // Title
        cx.fillStyle='rgba(255,255,255,0.55)';
        cx.font='italic 48px serif'; cx.fillText(sec.t,512,320);

        const tex = new THREE.CanvasTexture(cv);
        const mat = new THREE.MeshStandardMaterial({
            map:tex, roughness:0.35, metalness:0.05,
            emissive:col, emissiveIntensity:0.04
        });

        // Try real image
        TL.load(sec.f+'cover.jpg',(t)=>{mat.map=t;mat.needsUpdate=true;},undefined,()=>{});

        // ═════════════════════════════════
        // 🖼️ FLOATING painting (0.3 off wall)
        // ═════════════════════════════════
        const painting = new THREE.Mesh(new THREE.PlaneGeometry(pW, pH), mat);
        painting.position.set(wallX-side*0.3, 2.3, z);
        painting.rotation.y = side===-1 ? Math.PI/2 : -Math.PI/2;
        painting.userData = { idx:i, sec, mat, aura:auraMat, baseScale:1 };
        scene.add(painting);
        paintings.push(painting);


        // ═════════════════════════════════
        // 🪟 ORNATE DOUBLE FRAME
        // ═════════════════════════════════
        const f1Mat = new THREE.MeshBasicMaterial({color:0x8a6d28});
        const f2Mat = new THREE.MeshBasicMaterial({color:0x5a4818});
        const fb=0.1;

        // Inner gold frame
        [[0,pH/2+fb/2,0.02,pW+fb*2,fb],[0,-pH/2-fb/2,0.02,pW+fb*2,fb],
         [-pW/2-fb/2,0,0.02,fb,pH+fb*2],[pW/2+fb/2,0,0.02,fb,pH+fb*2]].forEach(([x,y,zz,w,h])=>{
            const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.04),f1Mat);
            m.position.set(x,y,zz); painting.add(m);
        });
        // Outer dark frame
        const ob=fb+0.05;
        [[0,pH/2+ob,0.01,pW+ob*2+0.05,0.04],[0,-pH/2-ob,0.01,pW+ob*2+0.05,0.04],
         [-pW/2-ob,0,0.01,0.04,pH+ob*2],[pW/2+ob,0,0.01,0.04,pH+ob*2]].forEach(([x,y,zz,w,h])=>{
            const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.02),f2Mat);
            m.position.set(x,y,zz); painting.add(m);
        });

        // Corner ornaments (tiny gold dots at corners)
        [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([cx,cy])=>{
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.04,6,6), f1Mat
            );
            dot.position.set(cx*(pW/2+ob), cy*(pH/2+ob), 0.02);
            painting.add(dot);
        });


        // ═════════════════════════════════
        // 🟡 GLOW POOL on floor
        //
        // A colored circle of light on the floor
        // directly below each painting
        // ═════════════════════════════════
        const poolMat = new THREE.MeshBasicMaterial({
            color:sec.c, transparent:true, opacity:0.04,
            blending:THREE.AdditiveBlending, depthWrite:false
        });
        const pool = new THREE.Mesh(new THREE.CircleGeometry(2.5, 24), poolMat);
        pool.rotation.x = -Math.PI/2;
        pool.position.set(wallX-side*2.5, 0.01, z);
        scene.add(pool);
        painting.userData.pool = poolMat;


        // ═════════════════════════════════
        // 🔦 VOLUMETRIC LIGHT BEAM
        // ═════════════════════════════════
        const beamGeo = new THREE.CylinderGeometry(0.1, 1.8, 4, 8, 1, true);
        const beamMat = new THREE.MeshBasicMaterial({
            color:sec.c, transparent:true, opacity:0.015,
            side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
        });
        const beam = new THREE.Mesh(beamGeo, beamMat);
        beam.position.set(wallX-side*1.5, WH-0.5, z);
        beam.rotation.z = side===-1 ? -0.35 : 0.35;
        scene.add(beam);
        painting.userData.beam = beamMat;

        // Actual spotlight
        const spot = new THREE.SpotLight(sec.c, 0.9, 22, Math.PI/4.5, 0.7, 1.5);
        spot.position.set(wallX-side*(-3), WH-0.3, z);
        spot.target = painting;
        scene.add(spot); scene.add(spot.target);


        // ═════════════════════════════════
        // 🏷️ LABEL — museum plaque style
        // ═════════════════════════════════
        const lc = document.createElement('canvas'); lc.width=512; lc.height=96;
        const lx = lc.getContext('2d');
        lx.fillStyle='rgba(255,255,255,0.45)';
        lx.font='italic 26px serif'; lx.textAlign='center';
        lx.fillText(sec.t, 256, 32);
        lx.fillStyle=`rgba(${r},${g},${b},0.35)`;
        lx.font='10px monospace';
        lx.fillText(`COLLECTION 0${i+1}  ·  ${sec.n} WORKS`, 256, 60);
        // Thin line
        lx.strokeStyle='rgba(201,168,76,0.15)'; lx.lineWidth=0.5;
        lx.beginPath(); lx.moveTo(156,72); lx.lineTo(356,72); lx.stroke();

        const label = new THREE.Mesh(
            new THREE.PlaneGeometry(3,0.55),
            new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(lc),transparent:true})
        );
        label.position.set(0,-pH/2-0.6,0.01);
        painting.add(label);
    });
}


// ═══════════════════════════════════════════════════════════
// 📌 SEC 12: GOD RAYS & CEILING NEBULA ☀️🌌
//
// GOD RAYS: tall translucent planes that look like
//   shafts of light streaming down from the ceiling
//
// CEILING NEBULA: animated colored patches on the ceiling
//   that slowly shift — like being inside a planetarium! 🌌
// ═══════════════════════════════════════════════════════════

function buildAtmosphere() {

    // ─────────────────────────────
    // ☀️ GOD RAYS — light shafts
    //
    // Tall, thin, translucent planes
    // placed at intervals along the corridor
    // ─────────────────────────────
    for (let i = 0; i < D.length; i++) {
        const z = -(SZ + i*SP);
        const sec = D[i];

        // One shaft per painting zone, slightly offset
        const shaftGeo = new THREE.PlaneGeometry(1.2, WH);
        const shaftMat = new THREE.MeshBasicMaterial({
            color: sec.c, transparent:true, opacity:0.008,
            side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
        });

        // Main shaft
        const shaft = new THREE.Mesh(shaftGeo, shaftMat);
        shaft.position.set((Math.random()-0.5)*3, WH/2, z + (Math.random()-0.5)*3);
        shaft.rotation.y = Math.random()*0.5;
        scene.add(shaft);

        // Secondary thinner shaft
        const s2 = new THREE.Mesh(
            new THREE.PlaneGeometry(0.6, WH),
            new THREE.MeshBasicMaterial({
                color:0xffeedd, transparent:true, opacity:0.005,
                side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
            })
        );
        s2.position.set((Math.random()-0.5)*4, WH/2, z+2);
        s2.rotation.y = Math.random();
        scene.add(s2);
    }


    // ─────────────────────────────
    // 🌌 CEILING NEBULA
    //
    // Small colored circles on the ceiling
    // that give it a planetarium feel
    // ─────────────────────────────
    for (let i = 0; i < 40; i++) {
        const z = -Math.random()*GL + SZ;
        const x = (Math.random()-0.5)*GW*0.8;
        const secIdx = Math.floor(Math.random()*D.length);
        const c = D[secIdx].c;

        const neb = new THREE.Mesh(
            new THREE.CircleGeometry(0.3+Math.random()*0.8, 12),
            new THREE.MeshBasicMaterial({
                color:c, transparent:true,
                opacity:0.012+Math.random()*0.015,
                blending:THREE.AdditiveBlending, depthWrite:false
            })
        );
        neb.rotation.x = Math.PI/2;
        neb.position.set(x, WH-0.01, z);
        scene.add(neb);
    }
}


// ═══════════════════════════════════════════════════════════
// 📌 SEC 13: FIREFLY PARTICLES ✨
//
// Instead of plain dust, these are FIREFLIES:
//  - They pulse in brightness (sin wave on opacity)
//  - They drift lazily in 3D
//  - They're slightly larger and more magical
//  - Color-tinted based on nearby section
// ═══════════════════════════════════════════════════════════

let ptcSys;

function buildParticles() {
    const N = 500;
    const pos = new Float32Array(N*3);
    const cols = new Float32Array(N*3);
    const vel = [];

    for(let i=0;i<N;i++){
        pos[i*3]   = (Math.random()-0.5)*GW*0.85;
        pos[i*3+1] = 0.2+Math.random()*(WH-0.5);
        pos[i*3+2] = -Math.random()*GL+SZ;

        // 🎨 Color tint based on nearest section
        const nearSec = Math.min(D.length-1, Math.floor(Math.abs(pos[i*3+2]-SZ)/SP));
        const c = new THREE.Color(D[nearSec].c);
        cols[i*3]=c.r*0.4+0.6; cols[i*3+1]=c.g*0.4+0.6; cols[i*3+2]=c.b*0.4+0.6;

        vel.push({
            x:(Math.random()-0.5)*0.002,
            y:0.0005+Math.random()*0.002,
            z:(Math.random()-0.5)*0.0015,
            phase:Math.random()*Math.PI*2   // 🌊 Random phase for pulsing
        });
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color', new THREE.BufferAttribute(cols,3));

    const mat = new THREE.PointsMaterial({
        size:0.035, transparent:true, opacity:0.5,
        blending:THREE.AdditiveBlending, depthWrite:false,
        vertexColors:true
    });

    ptcSys = new THREE.Points(geo, mat);
    ptcSys.userData.vel = vel;
    scene.add(ptcSys);
}


// ═══════════════════════════════════════════════════════════
// 📌 SEC 14: CAMERA & MOMENTUM SCROLL 🎥
//
// NEW: momentum/inertia scrolling!
// Instead of directly mapping scroll → position,
// scroll adds VELOCITY which decays over time.
// This makes movement feel buttery smooth! 🧈
// ═══════════════════════════════════════════════════════════

let camTZ = 3;
const CAM_MIN = -(GL-6), CAM_MAX = 4;
let camVel = 0;                // 🧈 Velocity for momentum
let mx=0, my=0;               // 🖱️ Normalized mouse
let headBob=0;

addEventListener('wheel', e => {
    camVel -= e.deltaY * 0.0008;   // 🧈 Add velocity, not position!
}, {passive:true});

let tY=0;
addEventListener('touchstart', e=>{tY=e.touches[0].clientY;},{passive:true});
addEventListener('touchmove', e=>{
    const d=tY-e.touches[0].clientY; tY=e.touches[0].clientY;
    camVel -= d*0.003;
},{passive:true});

const mouse = new THREE.Vector2();
addEventListener('mousemove', e=>{
    mouse.x=(e.clientX/innerWidth)*2-1;
    mouse.y=-(e.clientY/innerHeight)*2+1;
    mx=(e.clientX/innerWidth-0.5)*2;
    my=(e.clientY/innerHeight-0.5)*2;
    const cg=document.getElementById('cglow');
    cg.style.left=e.clientX+'px'; cg.style.top=e.clientY+'px';
});


// ═══════════════════════════════════════════════════════════
// 📌 SEC 15: INTERACTION 🎯
// ═══════════════════════════════════════════════════════════

const ray = new THREE.Raycaster();

addEventListener('click', ()=>{
    if(document.getElementById('carousel').classList.contains('open')) return;
    if(document.getElementById('sitemap').classList.contains('open')) return;
    ray.setFromCamera(mouse, camera);
    const h = ray.intersectObjects(paintings, true);
    if(h.length>0){
        let t=h[0].object;
        while(t && t.userData.idx===undefined) t=t.parent;
        if(t) openCarousel(t.userData.idx);
    }
});


// ═══════════════════════════════════════════════════════════
// 📌 SEC 16: CAROUSEL 🎠
// ═══════════════════════════════════════════════════════════

function openCarousel(idx){
    const sec=D[idx];
    document.getElementById('c-title').textContent=sec.t;
    document.getElementById('c-sub').textContent=sec.s;
    const track=document.getElementById('c-track'); track.innerHTML='';

    for(let j=1;j<=sec.n;j++){
        const card=document.createElement('div'); card.className='c-card';
        const num=String(j).padStart(2,'0');
        const img=document.createElement('img');
        img.src=sec.f+`slide-${num}.jpg`; img.alt=`${sec.t} ${num}`;
        img.onerror=function(){
            this.style.display='none';
            const r2=(sec.c>>16)&255,g2=(sec.c>>8)&255,b2=sec.c&255;
            card.style.background=`radial-gradient(ellipse at 30% 40%,
                rgba(${r2},${g2},${b2},0.3),
                rgba(${r2>>2},${g2>>2},${b2>>2},0.8))`;
            const l=document.createElement('div');
            l.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;';
            l.innerHTML=`<span style="font-family:serif;font-style:italic;font-size:4rem;color:rgba(255,255,255,0.04)">${num}</span>
                         <span style="font-family:var(--fm);font-size:0.45rem;color:rgba(255,255,255,0.1);letter-spacing:0.2em;margin-top:0.5rem">${sec.t}</span>`;
            card.appendChild(l);
        };
        card.appendChild(img);
        const nl=document.createElement('div'); nl.className='c-card-n';
        nl.textContent=`${num} / ${sec.n}`; card.appendChild(nl);
        track.appendChild(card);
    }
    document.getElementById('carousel').classList.add('open');
}

document.getElementById('c-close').onclick=()=>document.getElementById('carousel').classList.remove('open');
document.getElementById('c-l').onclick=()=>document.getElementById('c-track').scrollBy({left:-450,behavior:'smooth'});
document.getElementById('c-r').onclick=()=>document.getElementById('c-track').scrollBy({left:450,behavior:'smooth'});
addEventListener('keydown',e=>{
    if(e.key==='Escape'){document.getElementById('carousel').classList.remove('open');document.getElementById('sitemap').classList.remove('open');}
    if(document.getElementById('carousel').classList.contains('open')){
        if(e.key==='ArrowLeft')document.getElementById('c-track').scrollBy({left:-450,behavior:'smooth'});
        if(e.key==='ArrowRight')document.getElementById('c-track').scrollBy({left:450,behavior:'smooth'});
    }
});


// ═══════════════════════════════════════════════════════════
// 📌 SEC 17: SITEMAP 🗺️
// ═══════════════════════════════════════════════════════════

function buildSitemap(){
    const grid=document.getElementById('sm-grid'); grid.innerHTML='';

    const lc=document.createElement('div'); lc.className='sm-card logo-c';
    const li=document.createElement('img'); li.className='sm-cover';
    li.src=LOGO; li.alt='Virtuos'; li.style.cssText='background:#000;object-fit:contain;padding:1.5rem;';
    lc.appendChild(li);
    const linf=document.createElement('div'); linf.className='sm-info';
    linf.innerHTML='<div class="sm-num">SECTION 00</div><div class="sm-t">Virtuos Studios</div><div class="sm-s">Home — Logo</div>';
    lc.appendChild(linf); grid.appendChild(lc);

    D.forEach((sec,i)=>{
        const card=document.createElement('div'); card.className='sm-card';
        const r=(sec.c>>16)&255,g=(sec.c>>8)&255,b=sec.c&255;
        card.style.borderColor=`rgba(${r},${g},${b},0.1)`;

        const ci=document.createElement('img'); ci.className='sm-cover';
        ci.src=sec.f+'cover.jpg'; ci.alt=sec.t;
        ci.onerror=function(){
            const ph=document.createElement('div'); ph.className='sm-ph';
            ph.style.background=`radial-gradient(ellipse at 40% 40%, rgba(${r},${g},${b},0.3), rgba(${r>>3},${g>>3},${b>>3},0.9))`;
            ph.textContent=`0${i+1}`; this.replaceWith(ph);
        };
        card.appendChild(ci);

        const badge=document.createElement('div'); badge.className='sm-badge';
        badge.textContent=`${sec.n} works`; card.appendChild(badge);

        const info=document.createElement('div'); info.className='sm-info';
        info.innerHTML=`<div class="sm-num">SECTION 0${i+1}</div><div class="sm-t">${sec.t}</div><div class="sm-s">${sec.s}</div>`;
        card.appendChild(info);

        const dots=document.createElement('div'); dots.className='sm-dots';
        for(let j=0;j<sec.n;j++){const d=document.createElement('div');d.className='sm-dot';dots.appendChild(d);}
        card.appendChild(dots);

        card.onclick=()=>{document.getElementById('sitemap').classList.remove('open');setTimeout(()=>openCarousel(i),250);};
        grid.appendChild(card);
    });
}

document.getElementById('sitemap-btn').onclick=()=>document.getElementById('sitemap').classList.add('open');
document.getElementById('sm-x').onclick=()=>document.getElementById('sitemap').classList.remove('open');


// ═══════════════════════════════════════════════════════════
// 📌 SEC 18: THE LIVING LOOP 🔁💗
//
// This is the heartbeat of the gallery.
// Every frame (60x per second), we:
//   1. Apply momentum scrolling 🧈
//   2. Move camera with parallax 🖱️
//   3. Make paintings REACT to proximity 📏💫
//   4. Animate firefly particles ✨
//   5. Update the HUD with color morphing 🎨
//   6. Pulse the color wash overlay 🌈
// ═══════════════════════════════════════════════════════════

let curSec=-1, time=0;

function animate(){
    requestAnimationFrame(animate);
    time += 0.016;

    // ═════════════════════════════════
    // 🧈 MOMENTUM SCROLLING
    //
    // Camera velocity decays by 4% each frame
    // This creates that smooth "glide" feeling!
    // ═════════════════════════════════
    camTZ += camVel;
    camVel *= 0.96;                    // 🧈 Friction
    camTZ = Math.max(CAM_MIN, Math.min(CAM_MAX, camTZ));

    // Smooth lerp to target
    camera.position.z += (camTZ - camera.position.z) * 0.08;

    // Head bob when moving
    if(Math.abs(camVel) > 0.001){
        headBob += 0.06;
        camera.position.y = 2.4 + Math.sin(headBob)*0.008;
    }

    // ═════════════════════════════════
    // 🖱️ PARALLAX + LOOK
    // ═════════════════════════════════
    camera.position.x += (mx*0.5 - camera.position.x)*0.035;
    camera.rotation.x += (-my*0.025 - camera.rotation.x)*0.025;

    // Auto look toward nearest painting
    const cz = camera.position.z;
    let closest=-1, closestD=Infinity;
    for(let i=0;i<D.length;i++){
        const d=Math.abs(cz-(-(SZ+i*SP)));
        if(d<closestD){closestD=d;closest=i;}
    }

    if(closest>=0 && closestD<SP*0.55){
        const side=closest%2===0?-1:1;
        camera.rotation.y += (side*0.06 - camera.rotation.y)*0.015;
    } else {
        camera.rotation.y *= 0.97;
    }


    // ═════════════════════════════════
    // 📏💫 PAINTING PROXIMITY REACTIONS
    //
    // As you approach a painting:
    //  - It scales up slightly (1.0 → 1.06)
    //  - Emissive glow intensifies
    //  - Aura behind gets brighter
    //  - Floor glow pool brightens
    //  - Light beam gets more visible
    // ═════════════════════════════════
    paintings.forEach((p, i) => {
        const d = Math.abs(cz - (-(SZ+i*SP)));
        const near = Math.max(0, 1 - d/(SP*0.7));  // 0=far, 1=right there
        const pulse = Math.sin(time*1.2+i*0.7)*0.5+0.5; // 0→1 sine

        // 📏 Scale up when near
        const s = 1 + near*0.05;
        p.scale.set(s, s, 1);

        // 💗 Emissive glow
        p.userData.mat.emissiveIntensity = 0.02 + near*0.15 + pulse*0.02;

        // 💫 Aura
        p.userData.aura.opacity = 0.03 + near*0.12;

        // 🟡 Floor pool
        p.userData.pool.opacity = 0.015 + near*0.06;

        // 🔦 Beam
        p.userData.beam.opacity = 0.008 + near*0.025;
    });


    // ═════════════════════════════════
    // ✨ FIREFLY PARTICLES
    // ═════════════════════════════════
    if(ptcSys){
        const pos=ptcSys.geometry.attributes.position;
        const vel=ptcSys.userData.vel;

        // 🌊 Pulse overall particle brightness
        ptcSys.material.opacity = 0.3 + Math.sin(time*0.8)*0.15;

        for(let i=0;i<vel.length;i++){
            pos.array[i*3]   += vel[i].x + Math.sin(time*0.5+vel[i].phase)*0.0008;
            pos.array[i*3+1] += vel[i].y;
            pos.array[i*3+2] += vel[i].z + Math.cos(time*0.3+vel[i].phase)*0.0005;

            if(pos.array[i*3+1]>WH){
                pos.array[i*3+1]=0.2;
                pos.array[i*3]=(Math.random()-0.5)*GW*0.85;
                pos.array[i*3+2]=-Math.random()*GL+SZ;
            }
        }
        pos.needsUpdate=true;
    }


    // ═════════════════════════════════
    // 🧭 HUD + COLOR MORPH 🎨
    // ═════════════════════════════════
    if(closest!==curSec){
        curSec=closest;
        const wash = document.getElementById('color-wash');

        if(closest>=0 && closestD<SP*0.65){
            const sec=D[closest];
            document.getElementById('hud-title').textContent=sec.t;
            document.getElementById('hud-sub').textContent=sec.s;
            document.getElementById('sec-num').textContent=`0${closest+1} / 09`;

            // 🎨 Color morph the HUD accent
            const r=(sec.c>>16)&255,g=(sec.c>>8)&255,b=sec.c&255;
            document.documentElement.style.setProperty('--accent-r',r);
            document.documentElement.style.setProperty('--accent-g',g);
            document.documentElement.style.setProperty('--accent-b',b);

            // 🌈 Color wash overlay
            wash.style.background=`radial-gradient(ellipse at 50% 80%, rgba(${r},${g},${b},0.03), transparent 70%)`;
            wash.style.opacity='1';
        } else {
            document.getElementById('hud-title').textContent='VIRTUOS STUDIOS';
            document.getElementById('hud-sub').textContent='';
            document.getElementById('sec-num').textContent='00 / 09';
            wash.style.opacity='0';
        }
    }

    // 📊 Progress
    const prog=Math.abs(cz-CAM_MAX)/Math.abs(CAM_MIN-CAM_MAX);
    document.getElementById('prog').style.width=`${Math.min(100,prog*100)}%`;

    // 🎯 Hover
    ray.setFromCamera(mouse, camera);
    const hits=ray.intersectObjects(paintings,true);
    const noOv=!document.getElementById('carousel').classList.contains('open')
            && !document.getElementById('sitemap').classList.contains('open');

    if(hits.length>0 && noOv){
        document.body.style.cursor='pointer';
        document.getElementById('click-hint').style.opacity='1';
    } else {
        document.body.style.cursor='crosshair';
        document.getElementById('click-hint').style.opacity='0';
    }

    renderer.render(scene, camera);
}


// ═══════════════════════════════════════════════════════════
// 📌 SEC 19: IGNITION 🚀
// ═══════════════════════════════════════════════════════════

function buildLights(){
    scene.add(new THREE.AmbientLight(0x080815, 0.45));

    // Ceiling lights (fewer, warmer)
    for(let i=0;i<GL;i+=18){
        const l=new THREE.PointLight(0xffeedd,0.2,20,2);
        l.position.set(0,WH-0.5,-i+SZ); scene.add(l);
    }

    // Entrance glow
    const el=new THREE.PointLight(0xd4a853,0.35,12,2);
    el.position.set(0,4,4); scene.add(el);
}

function buildLogo(){
    const tex=TL.load(LOGO);
    const logo=new THREE.Mesh(
        new THREE.PlaneGeometry(4.5,1.6),
        new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:0.75})
    );
    logo.position.set(0,2.8,-2); scene.add(logo);
}

(function boot(){
    buildCathedral();
    buildLogo();
    buildPaintings();
    buildAtmosphere();
    buildParticles();
    buildLights();
    buildSitemap();
    setTimeout(()=>document.getElementById('loading').classList.add('done'), 900);
    animate();
})();

addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>
