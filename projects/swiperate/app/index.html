<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwipeRate — XY/XYZ Rating Engine</title>
    <meta name="description"
        content="Rate, tag, and sort anything with spatial drag gestures. XY for 2 properties, XYZ for 3.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="sr-app" id="sr-app">
        <!-- Top Bar -->
        <header class="sr-header">
            <div class="sr-logo">
                <div class="sr-logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <span class="sr-logo-text">SwipeRate</span>
            </div>
            <div class="sr-toolbar">
                <div class="sr-mode-toggle">
                    <button class="sr-mode-btn active" data-mode="2d" id="btn-mode-2d">XY Mode</button>
                    <button class="sr-mode-btn" data-mode="3d" id="btn-mode-3d">XYZ Mode</button>
                </div>
                <div class="sr-actions">
                    <button class="sr-btn sr-btn-icon" id="btn-undo" title="Undo (⌘Z)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="1,4 1,10 7,10" />
                            <path d="M3.51,15a9,9,0,1,0,2.13-9.36L1,10" />
                        </svg>
                    </button>
                    <button class="sr-btn sr-btn-icon" id="btn-redo" title="Redo (⌘⇧Z)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="23,4 23,10 17,10" />
                            <path d="M20.49,15a9,9,0,1,1-2.13-9.36L23,10" />
                        </svg>
                    </button>
                    <button class="sr-btn sr-btn-icon" id="btn-bookmark" title="Bookmark (B)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M19,21l-7-5-7,5V5a2,2,0,0,1,2-2H17a2,2,0,0,1,2,2Z" />
                        </svg>
                    </button>
                    <div class="sr-counter">
                        <span id="sr-progress">0</span> / <span id="sr-total">0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Arena -->
        <main class="sr-arena" id="sr-arena">
            <!-- Zone overlay rendered by JS -->
            <!-- Card rendered by JS -->
            <div class="sr-drop-hint" id="sr-drop-hint">
                <p>Drag the card to rate it</p>
                <p class="sr-hint-sub">Scroll wheel = Z-axis depth</p>
            </div>
        </main>

        <!-- Bottom: History Rail -->
        <div class="sr-history-rail" id="sr-history-rail">
            <div class="sr-rail-inner" id="sr-rail-inner"></div>
        </div>

        <!-- Sidebar: Reviewer Panel (rendered by JS) -->
        <aside class="sr-sidebar" id="sr-sidebar"></aside>

        <!-- Config Panel -->
        <div class="sr-config-panel" id="sr-config-panel" style="display:none;">
            <h3>Axis Configuration</h3>
            <div class="sr-config-row">
                <label>X Axis:</label>
                <input type="text" id="cfg-x-label" placeholder="Property A">
            </div>
            <div class="sr-config-row">
                <label>Y Axis:</label>
                <input type="text" id="cfg-y-label" placeholder="Property B">
            </div>
            <div class="sr-config-row">
                <label>Z Axis:</label>
                <input type="text" id="cfg-z-label" placeholder="Property C">
            </div>
            <button class="sr-btn sr-btn-primary" id="btn-apply-config">Apply</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
