<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntiGravity — Prototype Portfolio</title>
  <meta name="description" content="A living portfolio of AntiGravity prototypes, platforms, and experiments.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛸</text></svg>">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">🛸</span>
      <div class="brand-text">
        <h1>AntiGravity</h1>
        <span class="brand-sub">prototype portfolio</span>
      </div>
    </div>
    <div class="topbar-stats" id="topbar-stats"></div>
  </header>

  <main class="shell">
    <section class="hero">
      <h2>Every experiment, one launchpad.</h2>
      <p id="hero-sub">A living portfolio of platforms, 3D demos, wikis, scrapers, and tools.</p>
    </section>

    <section class="controls" aria-label="Filters">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input type="search" id="search" placeholder="Search projects, tech, ideas…  ( / )" autocomplete="off">
      </div>
      <div class="chip-row" id="category-chips"></div>
      <div class="chip-row chip-row-status" id="status-chips"></div>
    </section>

    <section id="gallery" class="gallery" aria-live="polite"></section>
    <p id="empty-state" class="empty-state" hidden>Nothing matches — try clearing filters.</p>
  </main>

  <footer class="footer">
    <p>AntiGravity Research Lab · rebuilt <span id="year"></span> · <span id="footer-count"></span> prototypes and counting</p>
  </footer>

  <!-- Detail overlay -->
  <div class="overlay" id="overlay" hidden>
    <div class="overlay-backdrop" data-close></div>
    <article class="detail" role="dialog" aria-modal="true">
      <button class="detail-close" data-close aria-label="Close">✕</button>
      <div class="detail-media" id="detail-media"></div>
      <div class="detail-body">
        <div class="detail-head">
          <div>
            <h3 id="detail-name"></h3>
            <p class="detail-tagline" id="detail-tagline"></p>
          </div>
          <div class="detail-actions" id="detail-actions"></div>
        </div>
        <p class="detail-desc" id="detail-desc"></p>
        <ul class="detail-highlights" id="detail-highlights"></ul>
        <div class="detail-meta">
          <div class="meta-block" id="detail-tech-block"><h4>Tech</h4><div class="chiplets" id="detail-tech"></div></div>
          <div class="meta-block" id="detail-variants-block" hidden><h4>Variants</h4><div class="chiplets" id="detail-variants"></div></div>
          <div class="meta-block" id="detail-links-block" hidden><h4>Links</h4><div class="chiplets" id="detail-links"></div></div>
          <div class="meta-block"><h4>Source</h4><code id="detail-source"></code></div>
        </div>
      </div>
    </article>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
