<script>

/* ============================================================
   🔧 TAB SWITCHING LOGIC
   When you click a tab, we:
   1. Remove "active" from all tabs & frames
   2. Add "active" to the clicked tab & its frame
   3. Lazy-load the iframe content on first view
   ============================================================ */

// 🏷️ Track if each frame has been loaded yet
const loaded = { space: false, guide: false };

// 👆 Wire up tab buttons
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabName = btn.dataset.tab;

    // 🎨 Update button highlights
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // 📺 Show the right frame, hide the other
    document.querySelectorAll('.tab-frame').forEach(f => f.classList.remove('active'));
    document.getElementById('frame-' + tabName).classList.add('active');

    // 🚀 Lazy-load content on first view
    if (!loaded[tabName]) {
      loadTab(tabName);
      loaded[tabName] = true;
    }
  });
});

// 🚀 Load the 3D space on initial page load
loadTab('space');
loaded.space = true;


/* ============================================================
   📄 LOAD TAB CONTENT
   We write the full HTML for each tab into its iframe
   using srcdoc. This keeps them perfectly isolated —
   the 3D app's "overflow:hidden" doesn't affect the
   dashboard's scrolling, etc.
   ============================================================ */
function loadTab(tabName) {
  const frame = document.getElementById('frame-' + tabName);

  if (tabName === 'space') {
    frame.srcdoc = SPACE_HTML;
  } else if (tabName === 'guide') {
    frame.srcdoc = GUIDE_HTML;
  }
}


/* ╔═══════════════════════════════════════════════════════════════════════╗

   ║  PART B — 🎮 THE 3D COLLABORATIVE SPACE                             ║

const SPACE_HTML = `<!DOCTYPE html>

<!-- ═══════════════════════════════════════

<script>
/* ═══════════════════════════════════════════════════════════
   B3-B13. 🧠 3D APP JAVASCRIPT
   Full collaborative 3D space engine
   ═══════════════════════════════════════════════════════════ */

// 🎨 B3. CONFIG
const OBJECT_COLORS=[0x7b5cff,0xff6b6b,0x4ecdc4,0xffd93d,0xff8a5c,0xa8e6cf,0xdda0dd,0x87ceeb,0xf0e68c,0xfa8072];
const WORLD_SIZE=50;
const SYNC_RATE=50;

// 🆔 B4. ROOM & USER IDs
function makeId(n=6){const c='abcdefghijklmnopqrstuvwxyz0123456789';let r='';for(let i=0;i<n;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function getRoomId(){
  // 🏠 Check the TOP-LEVEL window's hash (not the iframe's)
  try{
    const h=window.top.location.hash.slice(1);
    if(h&&h.length>2)return h;
  }catch(e){}
  const h=window.location.hash.slice(1);
  if(h&&h.length>2)return h;
  const nr='void-'+makeId(6);
  try{window.top.location.hash=nr}catch(e){window.location.hash=nr}
  return nr;
}
const MY_USER_ID=makeId(8);
const ROOM_ID=getRoomId();
const MY_COLOR=OBJECT_COLORS[Math.floor(Math.random()*OBJECT_COLORS.length)];

// 📡 B5. REAL-TIME SYNC
const sceneObjects=new Map();
const connectedUsers=new Map();
connectedUsers.set(MY_USER_ID,{color:MY_COLOR,lastSeen:Date.now()});
let broadcastChannel=null;
try{broadcastChannel=new BroadcastChannel('voidroom_'+ROOM_ID);broadcastChannel.onmessage=(e)=>handleSyncMessage(e.data)}catch(e){}
function broadcastMessage(msg){msg.sender=MY_USER_ID;msg.room=ROOM_ID;msg.time=Date.now();if(broadcastChannel)try{broadcastChannel.postMessage(msg)}catch(e){}try{localStorage.setItem('voidroom_'+ROOM_ID+'_msg',JSON.stringify(msg))}catch(e){}}
window.addEventListener('storage',(e)=>{if(e.key==='voidroom_'+ROOM_ID+'_msg'&&e.newValue)try{const m=JSON.parse(e.newValue);if(m.sender!==MY_USER_ID)handleSyncMessage(m)}catch(e){}});
function handleSyncMessage(msg){if(!msg||msg.sender===MY_USER_ID)return;if(msg.type==='join'){connectedUsers.set(msg.sender,{color:msg.color,lastSeen:Date.now()});updateUserCount();showToast('👋 User '+msg.sender.slice(0,4)+' joined!','var(--accent-3)');broadcastFullState()}if(msg.type==='place')addObjectToScene(msg.data,false);if(msg.type==='update')updateSceneObject(msg.data);if(msg.type==='delete')removeObjectFromScene(msg.objectId,false);if(msg.type==='fullstate'){msg.objects.forEach(o=>addObjectToScene(o,false));connectedUsers.set(msg.sender,{color:msg.color,lastSeen:Date.now()});updateUserCount()}if(msg.type==='heartbeat'){connectedUsers.set(msg.sender,{color:msg.color,lastSeen:Date.now()});updateUserCount()}}
function broadcastFullState(){const o=[];sceneObjects.forEach((d,id)=>o.push(serializeObject(id,d)));broadcastMessage({type:'fullstate',objects:o,color:MY_COLOR})}
function serializeObject(id,d){return{id,shape:d.shape,color:d.mesh.material.color.getHex(),px:d.mesh.position.x,py:d.mesh.position.y,pz:d.mesh.position.z,rx:d.mesh.rotation.x,ry:d.mesh.rotation.y,rz:d.mesh.rotation.z,sx:d.mesh.scale.x,sy:d.mesh.scale.y,sz:d.mesh.scale.z,owner:d.owner}}
setInterval(()=>{broadcastMessage({type:'heartbeat',color:MY_COLOR});const now=Date.now();connectedUsers.forEach((info,uid)=>{if(uid!==MY_USER_ID&&now-info.lastSeen>10000){connectedUsers.delete(uid);showToast('👋 User '+uid.slice(0,4)+' left','var(--accent-2)')}});updateUserCount()},3000);
function updateUserCount(){const el=document.getElementById('user-count');if(el)el.textContent='👤 '+connectedUsers.size}

// 🌍 B6. THREE.JS WORLD
const scene=new THREE.Scene();scene.background=new THREE.Color(0x07070c);scene.fog=new THREE.FogExp2(0x07070c,0.015);
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,200);camera.position.set(0,8,15);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false,powerPreference:'high-performance'});renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=0.9;
document.getElementById('scene-container').appendChild(renderer.domElement);
const ambientLight=new THREE.AmbientLight(0x404060,0.6);scene.add(ambientLight);
const sunLight=new THREE.DirectionalLight(0xffeedd,0.8);sunLight.position.set(10,20,10);sunLight.castShadow=true;sunLight.shadow.mapSize.width=2048;sunLight.shadow.mapSize.height=2048;sunLight.shadow.camera.near=0.5;sunLight.shadow.camera.far=60;sunLight.shadow.camera.left=-30;sunLight.shadow.camera.right=30;sunLight.shadow.camera.top=30;sunLight.shadow.camera.bottom=-30;scene.add(sunLight);

const floorGeo=new THREE.PlaneGeometry(WORLD_SIZE,WORLD_SIZE);const floorMat=new THREE.MeshStandardMaterial({color:0x0d0d1a,roughness:0.9,transparent:true,opacity:0.5});const floorMesh=new THREE.Mesh(floorGeo,floorMat);floorMesh.rotation.x=-Math.PI/2;floorMesh.position.y=-0.01;floorMesh.receiveShadow=true;floorMesh.userData.isFloor=true;scene.add(floorMesh);

function createGeometry(s){switch(s){case'cube':return new THREE.BoxGeometry(1,1,1);case'sphere':return new THREE.SphereGeometry(0.6,32,32);case'cylinder':return new THREE.CylinderGeometry(0.5,0.5,1,32);case'cone':return new THREE.ConeGeometry(0.5,1.2,32);case'torus':return new THREE.TorusGeometry(0.5,0.2,16,48);case'tetra':return new THREE.TetrahedronGeometry(0.7);case'icosa':return new THREE.IcosahedronGeometry(0.6);case'octahedron':return new THREE.OctahedronGeometry(0.6);case'knot':return new THREE.TorusKnotGeometry(0.4,0.15,100,16);case'plane':return new THREE.PlaneGeometry(1.5,1.5);default:return new THREE.BoxGeometry(1,1,1)}}

function getHitObject(x,y){pointer2D.x=(x/window.innerWidth)*2-1;pointer2D.y=-(y/window.innerHeight)*2+1;raycaster.setFromCamera(pointer2D,camera);const meshes=[];sceneObjects.forEach(e=>meshes.push(e.mesh));return raycaster.intersectObjects(meshes,false)[0]||null}

function onPointerDown(x,y,button=0){pointerX=x;pointerY=y;pointerDownX=x;pointerDownY=y;lastPointerX=x;lastPointerY=y;if(button===2){isOrbiting=true;return}if(currentTool==='place'){const pt=getFloorPoint(x,y);if(pt){addObjectToScene({shape:selectedShape,color:MY_COLOR,px:Math.round(pt.x*2)/2,py:0.5,pz:Math.round(pt.z*2)/2,owner:MY_USER_ID});showToast('✅ Placed '+selectedShape,'var(--accent-3)')}return}const hit=getHitObject(x,y);if(hit&&!hit.object.userData.isFloor){const objId=hit.object.userData.objectId;const entry=sceneObjects.get(objId);if(currentTool==='delete'){removeObjectFromScene(objId);showToast('🗑️ Deleted','var(--accent-2)');return}if(currentTool==='color'){const nc=OBJECT_COLORS[Math.floor(Math.random()*OBJECT_COLORS.length)];hit.object.material.color.setHex(nc);broadcastMessage({type:'update',data:{...serializeObject(objId,entry),color:nc}});showToast('🎨 Recolored!','var(--accent-4)');return}selectedObject={id:objId,mesh:hit.object,entry};isDragging=true;document.body.classList.add('grabbing');const fp=getFloorPoint(x,y);if(fp)dragOffset.copy(hit.object.position).sub(fp);updateSelectionInfo()}else{selectedObject=null;isDragging=false;isOrbiting=true;hideSelectionInfo()}}
